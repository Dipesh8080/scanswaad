<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - ScanSwaad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #fffaf0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      color: white;
    }
    .logout-btn {
      background: #fff;
      color: #f7a000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .container {
      padding: 3rem 2rem;
      text-align: center;
    }
    .container h2 {
      color: #f7a000;
    }
  </style>
</head>
<body>

  <header>
    <h1>ScanSwaad Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div class="container">
    <h2>Welcome to your restaurant dashboard!</h2>
    <p>This is where your editable menu, QR code, and profile will appear.</p>
  </div>

  <!-- Firebase Auth -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCe-Ux3P8DmK5Ww48le78eteA3SKSDROB4",
      authDomain: "scanswaad.firebaseapp.com",
      projectId: "scanswaad",
      storageBucket: "scanswaad.appspot.com",
      messagingSenderId: "1089517894295",
      appId: "1:1089517894295:web:7667a070579bdf3a7487d2",
      measurementId: "G-5S10F3CMD4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check login status
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      }
    });

    // Logout function
    window.logout = () => {
      signOut(auth).then(() => {
        alert("Logged out successfully!");
        window.location.href = "index.html";
      });
    };
  </script>

</body>
</html>
