<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script type="module">
    // Firebase import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const authButton = document.getElementById("authButton");
    const googleBtn = document.getElementById("googleLoginBtn");
    const formTitle = document.getElementById("formTitle");

    authButton.addEventListener("click", async () => {
      const email = document.getElementById("emailInput").value;
      const password = document.getElementById("passwordInput").value;

      if (formTitle.innerText === "Login") {
        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "dashboard.html";
        } catch (err) {
          alert("❌ " + err.message);
        }
      } else {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          window.location.href = "dashboard.html";
        } catch (err) {
          alert("❌ " + err.message);
        }
      }
    });

    googleBtn.addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        if (result.user) {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        alert("❌ Google Login Error: " + err.message);
      }
    });

  </script>
  <style>
    /* Same CSS you had before for UI */
    /* (keeping your old style for layout + modal) */
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.7rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .modal-content button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 1rem;
      background: #f7a000;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .toggle-link {
      margin-top: 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      color: #f7a000;
    }
    .google-btn {
      margin-top: 0.5rem;
      background: #4285F4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .google-btn img {
      width: 18px;
    }
    body {
      background: #fff9f0;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .login-btn {
      background: #fff;
      color: #f7a000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .hero { text-align: center; padding: 3rem 2rem; }
    .hero h1 { font-size: 2.5rem; color: #f7a000; }
    .cta {
      background: #f7a000;
      color: white;
      padding: 1rem 2rem;
      text-decoration: none;
      border-radius: 8px;
      display: inline-block;
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="ScanSwaad Logo" />
    <nav>
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#blog">Blog</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="login-btn" onclick="openModal()">Login / Signup</button>
  </header>

  <section class="hero" id="home">
    <h1>Scan. Order. Enjoy.</h1>
    <p>Digitize your restaurant menu with a QR code in minutes.</p>
    <a class="cta" href="https://docs.google.com/forms/d/e/1FAIpQLSds5htHOCbpFipvtPpVsBgfIySPX6K4webpAjeEC2cYw2uCfg/viewform" target="_blank">Get Started</a>
  </section>

  <!-- Modal -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <h2 id="formTitle">Login</h2>
      <div id="signupFields" style="display: none;">
        <input type="text" placeholder="First Name" />
        <input type="text" placeholder="Last Name" />
        <input type="text" placeholder="Restaurant Name" />
        <input type="text" placeholder="Owner Name" />
      </div>
      <input type="email" id="emailInput" placeholder="Email" />
      <input type="password" id="passwordInput" placeholder="Password" />
      <button id="authButton">Login</button>
      <button class="google-btn" id="googleLoginBtn"><img src="https://img.icons8.com/color/48/000000/google-logo.png" /> Login with Google</button>
      <div class="toggle-link" onclick="toggleAuth()">Don't have an account? Sign Up</div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('authModal');
    const formTitle = document.getElementById("formTitle");
    const signupFields = document.getElementById("signupFields");
    const authButton = document.getElementById("authButton");
    const toggleLink = document.querySelector(".toggle-link");

    function openModal() {
      modal.style.display = "flex";
    }

    window.onclick = function(e) {
      if (e.target == modal) modal.style.display = "none";
    }

    function toggleAuth() {
      const isLogin = formTitle.innerText === "Login";
      formTitle.innerText = isLogin ? "Sign Up" : "Login";
      signupFields.style.display = isLogin ? "block" : "none";
      authButton.innerText = isLogin ? "Sign Up" : "Login";
      toggleLink.innerText = isLogin ? "Already have an account? Login" : "Don't have an account? Sign Up";
    }
  </script>
</body>
</html>
