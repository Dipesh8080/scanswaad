<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #fff9f0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img { height: 50px; }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .login-btn {
      background: #fff;
      color: #f7a000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .hero {
      padding: 3rem 2rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.5rem;
      color: #f7a000;
    }
    .hero p { margin: 1rem 0; font-size: 1.2rem; }
    .cta {
      background: #f7a000;
      color: #fff;
      padding: 1rem 2rem;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      display: inline-block;
      margin-top: 1rem;
    }
    .section {
      padding: 3rem 2rem;
      text-align: center;
    }
    footer {
      margin-top: 4rem;
      background: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="ScanSwaad Logo" />
    <nav>
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#blog">Blog</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="login-btn" onclick="openModal()">Login / Signup</button>
  </header>

  <section class="hero" id="home">
    <h1>Scan. Order. Enjoy.</h1>
    <p>Digitize your restaurant menu with a QR code in minutes.</p>
    <a class="cta" href="#">Get Started</a>
  </section>

  <section class="section" id="features">
    <h2>Features</h2>
    <p>Your features will go here...</p>
  </section>

  <section class="section" id="pricing">
    <h2>Pricing</h2>
    <p>Your pricing details will go here...</p>
  </section>

  <footer>
    © 2025 ScanSwaad. All rights reserved.
  </footer>

  <!-- Firebase Configuration -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCe-Ux3P8DmK5Ww48le78eteA3SKSDROB4",
      authDomain: "scanswaad.firebaseapp.com",
      projectId: "scanswaad",
      storageBucket: "scanswaad.appspot.com",
      messagingSenderId: "1089517894295",
      appId: "1:1089517894295:web:7667a070579bdf3a7487d2",
      measurementId: "G-5S10F3CMD4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>

  <!-- Modal Handling -->
  <script>
    function openModal() {
      alert("Login / Signup button clicked!");
    }
  </script>
</body>
</html>
