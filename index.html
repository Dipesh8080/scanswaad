<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }
    body {
      background: #fff9f0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header img {
      height: 50px;
    }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    .hero {
      padding: 3rem 2rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.5rem;
      color: #f7a000;
    }
    .hero p {
      margin: 1rem 0;
      font-size: 1.2rem;
    }
    .cta {
      background: #f7a000;
      color: #fff;
      padding: 1rem 2rem;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      display: inline-block;
      margin-top: 1rem;
      transition: background 0.3s;
    }
    .cta:hover {
      background: #d88900;
    }
    .section {
      padding: 3rem 2rem;
      text-align: center;
    }
    .section h2 {
      color: #f7a000;
      margin-bottom: 1rem;
    }
    .features, .pricing {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid #eee;
      padding: 2rem;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card h3 {
      color: #f7a000;
      margin-bottom: 0.5rem;
    }
    .card p {
      font-size: 0.95rem;
      color: #555;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
