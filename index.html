<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #fff9f0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img { height: 50px; }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .login-btn {
      background: #fff;
      color: #f7a000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="ScanSwaad Logo" />
    <nav>
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#blog">Blog</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="login-btn" onclick="showLoginModal()">Login / Signup</button>
  </header>

  <!-- Firebase Configuration -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCe-Ux3P8DmK5Ww48le78eteA3SKSDROB4",
      authDomain: "scanswaad.firebaseapp.com",
      projectId: "scanswaad",
      storageBucket: "scanswaad.appspot.com",
      messagingSenderId: "1089517894295",
      appId: "1:1089517894295:web:7667a070579bdf3a7487d2",
      measurementId: "G-5S10F3CMD4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function showLoginModal() {
      const email = prompt("Enter your email:");
      const password = prompt("Enter your password:");

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("✅ Successfully logged in! Redirecting to Dashboard...");
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          alert("❌ Error: " + error.message);
        });
    }
  </script>
</body>
</html>
