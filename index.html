<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #fff9f0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img {
      height: 50px;
    }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .hero {
      padding: 3rem 2rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.5rem;
      color: #f7a000;
    }
    .hero p {
      margin: 1rem 0;
      font-size: 1.2rem;
    }
    .cta {
      background: #f7a000;
      color: #fff;
      padding: 1rem 2rem;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }
    footer {
      margin-top: 4rem;
      background: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="ScanSwaad Logo" />
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Scan. Order. Enjoy.</h1>
    <p>Digitize your restaurant menu with a QR code in minutes.</p>
    <a class="cta" href="#">Get Started</a>https://docs.google.com/forms/d/e/1FAIpQLSds5htHOCbpFipvtPpVsBgfIySPX6K4webpAjeEC2cYw2uCfg/viewform
  </section>

  <footer>
    © 2025 ScanSwaad. All rights reserved.
  </footer>

</body>
</html>
