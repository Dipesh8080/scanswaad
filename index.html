<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #ffffff;
      color: #000;
    }
    header {
      background-color: #F7A000;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img {
      height: 40px;
    }
    nav a {
      margin: 0 15px;
      color: #000;
      text-decoration: none;
      font-weight: 600;
    }
    .hero {
      padding: 60px 20px;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c') no-repeat center center/cover;
      color: white;
    }
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .hero button {
      padding: 12px 24px;
      background-color: #F7A000;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
    }
    footer {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://i.ibb.co/KVq9X3g/scanswaad-logo.png" alt="ScanSwaad Logo">
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Scan. Order. Enjoy.</h1>
    <p>Digitize your restaurant menu with a QR code in minutes.</p>
    <button>Get Started</button>
  </section>

  <footer>
    <p>&copy; 2025 ScanSwaad. All Rights Reserved.</p>
  </footer>
</body>
</html>
