<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Dynamic Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #fff9f0;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #f7a000;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    header img {
      height: 50px;
    }
    nav a {
      margin-left: 1.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    .section {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    h2 {
      color: #f7a000;
      margin-bottom: 1rem;
    }
    .menu-category {
      margin-bottom: 2rem;
    }
    .menu-item {
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .menu-item h4 {
      margin: 0;
      font-size: 1.1rem;
    }
    .menu-item p {
      margin: 0.3rem 0;
      color: #666;
    }
    .menu-item span {
      font-weight: bold;
      float: right;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #333;
      color: white;
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="ScanSwaad Logo">
    <nav>
      <a href="#">Home</a>
      <a href="#menu">Menu</a>
    </nav>
  </header>

  <section class="section" id="menu">
    <h2>Our Menu</h2>
    <div id="menuContainer">
      <!-- Menu will be injected by JavaScript -->
    </div>
  </section>

  <footer>
    © 2025 ScanSwaad. All rights reserved.
  </footer>

  <script>
    const menuData = [
      {
        category: "Starters",
        items: [
          { name: "Paneer Tikka", price: "₹180", desc: "Grilled paneer with spices" },
          { name: "Veg Spring Rolls", price: "₹120", desc: "Crispy rolls with veggie filling" }
        ]
      },
      {
        category: "Main Course",
        items: [
          { name: "Butter Paneer", price: "₹240", desc: "Rich butter paneer with gravy" },
          { name: "Veg Biryani", price: "₹200", desc: "Aromatic rice with veggies" }
        ]
      },
      {
        category: "Desserts",
        items: [
          { name: "Gulab Jamun", price: "₹80", desc: "Traditional sweet treat" },
          { name: "Ice Cream", price: "₹90", desc: "Vanilla/Chocolate options" }
        ]
      }
    ];

    const menuContainer = document.getElementById('menuContainer');

    menuData.forEach(category => {
      const categoryDiv = document.createElement('div');
      categoryDiv.className = 'menu-category';

      const title = document.createElement('h3');
      title.textContent = category.category;
      categoryDiv.appendChild(title);

      category.items.forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'menu-item';
        itemDiv.innerHTML = `<h4>${item.name} <span>${item.price}</span></h4><p>${item.desc}</p>`;
        categoryDiv.appendChild(itemDiv);
      });

      menuContainer.appendChild(categoryDiv);
    });
  </script>

</body>
</html>
