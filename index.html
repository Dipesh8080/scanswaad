<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScanSwaad - Scan. Order. Enjoy.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #fff9f0; color: #333; }
    header { background: #f7a000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header img { height: 50px; }
    nav a { margin-left: 1.5rem; color: #fff; text-decoration: none; font-weight: bold; }
    .login-btn { background: #fff; color: #f7a000; border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .hero { padding: 3rem 2rem; text-align: center; }
    .hero h1 { font-size: 2.5rem; color: #f7a000; }
    .hero p { margin: 1rem 0; font-size: 1.2rem; }
    .cta { background: #f7a000; color: #fff; padding: 1rem 2rem; text-decoration: none; font-weight: bold; border-radius: 8px; display: inline-block; margin-top: 1rem; }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="ScanSwaad Logo" />
    <nav>
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#blog">Blog</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="login-btn" onclick="showLoginModal()">Login / Signup</button>
  </header>

  <!-- Firebase Configuration -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCe-Ux3P8DmK5Ww48le78eteA3SKSDROB4",
      authDomain: "scanswaad.firebaseapp.com",
      projectId: "scanswaad",
      storageBucket: "scanswaad.appspot.com",
      messagingSenderId: "1089517894295",
      appId: "1:1089517894295:web:7667a070579bdf3a7487d2",
      measurementId: "G-5S10F3CMD4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>

  <!-- Login Modal -->
  <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5);">
    <div style="background:#fff; padding:2rem; margin:10% auto; width:90%; max-width:400px;">
      <h2>Login / Signup</h2>
      <input type="email" id="email" placeholder="Enter Email" required><br><br>
      <input type="password" id="password" placeholder="Enter Password" required><br><br>
      <button onclick="login()">Login</button>
      <button onclick="signup()">Sign Up</button>
      <br><br>
      <button onclick="googleLogin()">Login with Google</button>
      <br><br>
      <button onclick="closeModal()">Close</button>
      <div id="errorMessage" style="color:red;"></div>
    </div>
  </div>

  <script>
    function showLoginModal() {
      document.getElementById('loginModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('loginModal').style.display = 'none';
    }

    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login Successful!");
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          document.getElementById('errorMessage').innerText = error.message;
        });
    }

    function signup() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Signup Successful!");
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          document.getElementById('errorMessage').innerText = error.message;
        });
    }

    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      
      auth.signInWithPopup(provider)
        .then(() => {
          alert("Google Login Successful!");
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          document.getElementById('errorMessage').innerText = error.message;
        });
    }
  </script>
</body>
</html>
